name: Bug report
description: Report a reproducible Fleet Control bug
title: "fix: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste raw tokens, private IDs, cookies, signed URLs, or full unredacted logs.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: Fleet Control showed an auth issue as gateway offline...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `python3 control/fleetctl.py status --json --skip-network`
        2. Open the menu-bar app
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - macOS menu-bar app
        - Python CLI
        - Packaging/release artifact
        - Docs/onboarding
        - Other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: macOS 15.x, Ubuntu 24.04, Windows 11
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Paste only redacted output. Prefer `Copy Diagnostics` or metadata-only CLI output.
      render: shell
